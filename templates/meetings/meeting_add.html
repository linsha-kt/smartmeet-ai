{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>

Create Meeting

</h3>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-success">

Create Meeting

</button>

<a href="{% url 'meeting_list' %}" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
