{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="card shadow">

<div class="card-body text-center">

<h3>

Delete Meeting

</h3>

<p>

Are you sure you want to delete

<strong>

{{ meeting.title }}

</strong>

?

</p>

<form method="POST">

{% csrf_token %}

<button class="btn btn-danger">

Delete

</button>

<a href="{% url 'meeting_list' %}" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
