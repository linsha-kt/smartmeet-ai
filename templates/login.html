<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartMeet AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f4f7fb;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial;

}

.card{

width:420px;

padding:30px;

border:none;

border-radius:15px;

box-shadow:0px 5px 20px rgba(0,0,0,.1);

}

.logo{

font-size:45px;

text-align:center;

}

.title{

text-align:center;

font-weight:bold;

font-size:28px;

}

.subtitle{

text-align:center;

color:gray;

margin-bottom:25px;

}

.btn-primary{

width:100%;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

🎤

</div>

<div class="title">

SmartMeet AI

</div>

<div class="subtitle">

Enterprise Meeting Intelligence Platform

</div>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>

Username

</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Password

</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox">

<label class="form-check-label">

Remember Me

</label>

</div>

<button class="btn btn-primary">

Login

</button>

</form>

<hr>

<p class="text-center text-secondary">

© 2026 SmartMeet AI

</p>

</div>

</body>

</html>
